<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radio Stream</title>
  <link rel="stylesheet" href="css/1-base.css">
  <link rel="stylesheet" href="css/2-layout.css">
  <link rel="stylesheet" href="css/3-components.css">
  <link rel="stylesheet" href="css/4-responsive.css">
  <link rel="stylesheet" href="css/5-scrollbar.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📻</text></svg>">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-top">
        <h1 class="logo">Radio<span>Stream</span> <span class="version-badge">v1.0.0</span></h1>
        <div class="header-actions">
          <button class="icon-btn" id="themeToggle" title="Toggle tema">🌙</button>
        </div>
      </div>

      <div class="search-wrap">
        <div class="search-bar">
          <svg class="search-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="searchInput" placeholder="Cari stasiun, genre, atau negara..." autocomplete="off" spellcheck="false">
          <button class="clear-btn hidden" id="clearBtn" title="Hapus">✕</button>
        </div>
        <div class="suggestions" id="suggestions"></div>
        <div class="filter-row">
          <select id="countryFilter"><option value="">🌍 Semua Negara</option></select>
          <select id="tagFilter"><option value="">🎵 Semua Genre</option></select>
        </div>
      </div>

      <nav class="tabs">
        <button class="tab active" data-tab="search">🔍 Cari</button>
        <button class="tab" data-tab="popular">🔥 Populer</button>
        <button class="tab" data-tab="favorites">⭐ Favorit <span class="fav-count" id="favCount"></span></button>
      </nav>
    </header>

    <main class="main">
      <div class="toolbar">
        <span class="result-label" id="resultLabel">🔥 Stasiun paling populer</span>
        <span class="spinner hidden" id="spinner"></span>
      </div>
      <div class="grid" id="grid"></div>
    </main>

    <footer class="player" id="player">
      <div class="player-row">
        <div class="player-thumb" id="playerThumb">📻</div>
        <div class="player-body">
          <div class="player-title" id="playerTitle">Pilih stasiun radio</div>
          <div class="player-sub" id="playerSub">⏹ Berhenti</div>
        </div>
        <button class="player-fav ctrl-btn" id="favBtn" title="Favorit">☆</button>
        <div class="player-divider"></div>
        <button class="ctrl-btn" id="prevBtn" title="Sebelumnya">⏮</button>
        <button class="ctrl-btn ctrl-btn--play" id="playBtn" title="Putar/Berhenti">▶</button>
        <button class="ctrl-btn" id="nextBtn" title="Selanjutnya">⏭</button>
        <div class="volume-wrap">
          <button class="ctrl-btn" id="volumeBtn" title="Volume">🔊</button>
          <input type="range" id="volumeSlider" min="0" max="1" step="0.02" value="0.7" aria-label="Volume">
        </div>
      </div>
      <audio id="audio"></audio>
    </footer>
  </div>

  <!-- Load order: dependencies first -->
  <script src="js/1-state.js"></script>
  <script src="js/2-api.js"></script>
  <script src="js/3-storage.js"></script>
  <script src="js/4-player.js"></script>
  <script src="js/5-search.js"></script>
  <script src="js/6-ui.js"></script>
  <script src="js/7-init.js"></script>
</body>
</html>
